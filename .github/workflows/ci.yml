# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the action will run.
on:
  # Triggers the workflow on push events for all branches
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ main ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      - id: determine_deploy
        name: Determine deploy condition
        # Compute the branch/event condition once and expose it as a step output
        run: |
          echo "should_deploy=${{ github.event_name == 'push' && github.ref_name == 'main' }}" >> $GITHUB_OUTPUT

      # Runs a single command using the runners shell
      - name: Run a one-line script
        run: npm i && npm run build

      - name: Deploy to GitHub Pages
        if: success() && steps.determine_deploy.outputs.should_deploy == 'true'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: "./dist/"
          keep_files: true
          destination_dir: ""
